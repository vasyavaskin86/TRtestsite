<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>Корзина — СТАРТ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <button class="burger-menu" id="burgerMenu" aria-label="Меню">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="logo" onclick="window.location.href='index.html'">
        <img width="65%" height="20%" src="img/logo.png" alt="logo">
      </div>
      <nav class="main-nav" id="mainNav">
        <a href="index.html#catalog">Каталог</a>
        <a href="services.html">Услуги</a>
        <a href="index.html#about">О нас</a>
        <a href="index.html#contacts">Контакты</a>
      </nav>
      <div class="header-actions">
        <a class="pill" id="wishlistLink" href="wishlist.html" aria-label="Избранное">
          ❤ <span class="badge" id="wishlistCount">0</span>
        </a>
        <a class="pill" href="cart.html" aria-label="Корзина">
          Корзина <span class="badge" id="cartCount">0</span>
        </a>
        <a class="pill hidden" id="profileLink" href="profile.html">Профиль</a>
        <button class="pill pill-muted" id="authButton" type="button">Войти</button>
        <button class="pill pill-muted hidden" id="logoutButton" type="button">Выйти</button>
        <a class="admin-link hidden" href="admin.html">Админ-панель</a>
      </div>
    </div>
  </header>

  <main class="catalog">
    <div class="container">
      <header class="section-header">
        <h2>Корзина</h2>
        <p>Проверьте товары и оформите заказ (демо).</p>
      </header>

      <div id="cartEmpty" class="empty-state hidden">
        <p>Корзина пуста. Перейдите в <a class="link" href="index.html#catalog">каталог</a> и добавьте товары.</p>
      </div>

      <div id="cartLayout" class="cart-layout hidden">
        <div id="cartItems" class="cart-items"></div>

        <aside class="cart-summary">
          <div class="cart-summary-box">
            <div class="cart-summary-row">
              <span class="pill-muted">Товаров</span>
              <strong id="summaryCount">0</strong>
            </div>
            <div class="cart-summary-row">
              <span class="pill-muted">Итого</span>
              <strong id="summaryTotal">0 ₽</strong>
            </div>
            <div class="contact-form">
              <h3>Контакты покупателя</h3>
              <label>
                Имя *
                <input type="text" id="orderCustomerName" required />
              </label>
              <label>
                Телефон *
                <input type="tel" id="orderCustomerPhone" required />
              </label>
              <label>
                E-mail *
                <input type="email" id="orderCustomerEmail" required />
              </label>
              <div id="deliveryFields" class="hidden">
                <label>
                  Адрес доставки
                  <input type="text" id="orderDeliveryAddress" />
                </label>
                <label>
                  Комментарий к заказу
                  <textarea id="orderDeliveryComment" rows="2"></textarea>
                </label>
              </div>
            </div>
            <label id="paymentMethodWrap" class="hidden">
              Способ оплаты
              <select id="orderPaymentMethod">
                <option value="cash">Наличные при получении</option>
                <option value="online">Онлайн-оплата</option>
              </select>
            </label>
            <div class="cart-summary-actions">
              <button class="btn btn-primary" id="checkoutButton" type="button">Оформить заказ</button>
              <button class="btn btn-secondary" id="clearCartButton" type="button">Очистить корзину</button>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; <span id="year"></span> СТАРТ</p>
      <a href="index.html" class="footer-admin-link">На главную</a>
    </div>
  </footer>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/script.js"></script>
  <script src="js/cartPage.js"></script>
</body>
</html>
